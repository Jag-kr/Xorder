<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Summary Component</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Red+Hat+Display:wght@500;700;900&display=swap" rel="stylesheet">
</head>
<body>

  <div class="main">
    <div class="container">
      <img src="images/illustration-hero.svg" alt="Hero Illustration" class="hero-image">
      
      <div class="content">
        <h1 class="heading">Order Summary</h1>
        
        <p class="summary-para">You can now listen to millions of songs, audiobooks, and podcasts on any device anywhere you like!</p>
        
        <div class="plan-container">
          <img src="images/icon-music.svg" alt="Music Icon">
          
          <div class="plan-text">
            <span class="plan-title">Annual Plan</span>
            <span class="plan-price">$59.99/year</span>
          </div>
          
          <div class="change-link">
            <a href="#">Change</a>
          </div>
        </div>
        
        <button class="proceed-btn">Proceed to Payment</button>
        
        <a href="#" class="cancel-order">Cancel Order</a>
      </div>
    </div>
  </div>
  
  <div class="attribution" style="font-size: 11px; text-align: center; margin-top: 20px; color: var(--text-secondary);">
    Challenge by <a href="https://www.crio.do" style="color: hsl(228, 45%, 44%);">Crio.do</a>. 
    Coded by <a href="https://www.github.com/Jag-kr" target="_blank" rel="noopener noreferrer" style="color: hsl(228, 45%, 44%);">Jagjeet Kumar</a>.
  </div>

</body>
</html>
